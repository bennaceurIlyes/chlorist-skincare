<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Chlorice Lab</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --login-bg: #F9FAFB;
        }

        body {
            background-color: var(--login-bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .login-container {
            background: white;
            padding: 3rem;
            border-radius: var(--border-radius-lg);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-header img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-sm);
        }

        .login-header h1 {
            font-size: 1.75rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--color-grey-medium);
            font-size: 0.875rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-botanical-green);
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--color-grey-light);
            border-radius: var(--border-radius-md);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-botanical-green);
            box-shadow: 0 0 0 3px rgba(37, 68, 65, 0.05);
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            font-size: 0.875rem;
            color: var(--color-grey-medium);
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            background: var(--color-botanical-green);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: var(--border-radius-md);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-login:hover {
            background: #1a312f;
            transform: translateY(-1px);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            font-size: 0.875rem;
            color: var(--color-grey-medium);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--color-botanical-green);
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <img src="img/logo.jpg" alt="Chlorice Lab">
            <h1>Admin <span style="font-weight: 600;">Access</span></h1>
            <p>Welcome back, please login to manage your brand.</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="djihan@chlorice.lab" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <label class="remember-me">
                <input type="checkbox">
                Remember this device
            </label>
            <button type="submit" class="btn-login">Secure Login</button>
        </form>

        <a href="index.html" class="back-link">Return to Public Website</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            // Mock authentication success
            const btn = e.target.querySelector('button');
            btn.textContent = 'Authenticating...';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            setTimeout(() => {
                window.location.href = 'admin-dashboard.html';
            }, 1000);
        });
    </script>
</body>

</html>
