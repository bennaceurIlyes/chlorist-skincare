<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Chlorice Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #F9FAFB;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .login-container {
            background: white;
            padding: 3rem;
            border-radius: var(--border-radius-lg);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-header img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-sm);
        }

        .login-header h1 { font-size: 1.75rem; font-weight: 300; margin-bottom: 0.5rem; }
        .login-header p  { color: var(--color-grey-medium); font-size: 0.875rem; }

        .form-group { margin-bottom: 1.5rem; }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-botanical-green);
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--color-grey-light);
            border-radius: var(--border-radius-md);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-botanical-green);
            box-shadow: 0 0 0 3px rgba(37, 68, 65, 0.05);
        }

        .btn-login {
            width: 100%;
            background: var(--color-botanical-green);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: var(--border-radius-md);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-login:hover  { background: #1a312f; transform: translateY(-1px); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .error-msg {
            background: #FEE2E2;
            color: #B91C1C;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            font-size: 0.875rem;
            color: var(--color-grey-medium);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .back-link:hover { color: var(--color-botanical-green); }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <img src="img/logo.jpg" alt="Chlorice Lab">
            <h1>Admin <span style="font-weight: 600;">Access</span></h1>
            <p>Welcome back, please login to manage your brand.</p>
        </div>

        <div id="errorMsg" class="error-msg">Invalid email or password. Please try again.</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="admin@chlorice.lab" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Secure Login</button>
        </form>

        <a href="index.html" class="back-link">Return to Public Website</a>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        // If already logged in, skip to dashboard
        if (sessionStorage.getItem('chlorice_admin')) {
            window.location.href = 'admin-dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('errorMsg');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            btn.textContent = 'Authenticating...';
            btn.disabled = true;
            errEl.style.display = 'none';

            try {
                const db = window._supabase;
                const { data, error } = await db
                    .from('admin')
                    .select('id, email')
                    .eq('email', email)
                    .eq('password', password)
                    .single();

                if (error || !data) {
                    throw new Error('Invalid credentials');
                }

                // Store session
                sessionStorage.setItem('chlorice_admin', JSON.stringify({ id: data.id, email: data.email }));
                window.location.href = 'admin-dashboard.html';

            } catch (err) {
                errEl.style.display = 'block';
                btn.textContent = 'Secure Login';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
